name: Supabase Keep-Alive

on:
  schedule:
    # Every 3 days at 12:00 UTC (safely under Supabase's 7-day inactivity pause)
    - cron: '0 12 */3 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail

          ProjectUrl="${SUPABASE_URL:-${NEXT_PUBLIC_SUPABASE_URL:-}}"
          AnonKey="${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}}"

          if [ -z "${ProjectUrl}" ] || [ -z "${AnonKey}" ]; then
            echo "Missing repository secrets."
            echo "Add SUPABASE_URL + SUPABASE_ANON_KEY, or NEXT_PUBLIC_SUPABASE_URL + NEXT_PUBLIC_SUPABASE_ANON_KEY."
            exit 1
          fi

          # Trim trailing slash so URL joins are reliable
          ProjectUrl="${ProjectUrl%/}"

          ping() {
            local label="$1"
            local url="$2"
            local method="${3:-GET}"
            local body="${4:-}"

            local curl_args=(
              -sS -o "/tmp/supabase-ping-${label}.json" -w "%{http_code}"
              -H "apikey: ${AnonKey}"
              -H "Authorization: Bearer ${AnonKey}"
            )

            if [ "${method}" = "POST" ]; then
              curl_args+=(-X POST -H "Content-Type: application/json" -d "${body}")
            fi

            local http_code
            http_code=$(curl "${curl_args[@]}" "${url}")

            echo "--- ${label} ---"
            echo "HTTP status: ${http_code}"
            cat "/tmp/supabase-ping-${label}.json"
            echo ""

            test "${http_code}" = "200"
          }

          # Auth health: works with anon key (no RLS on app tables)
          ping "auth-health" "${ProjectUrl}/auth/v1/health"

          # Light DB touch via anon-allowed RPC (see get_public_default_locale migration)
          ping "default-locale-rpc" \
            "${ProjectUrl}/rest/v1/rpc/get_public_default_locale" \
            POST "{}"
